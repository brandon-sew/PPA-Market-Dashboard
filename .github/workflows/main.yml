name: Daily Market Update
on:
  schedule:
    - cron: '0 13 * * *' # Runs at 13:00 UTC (14:00 CET)
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Changed from v3 to v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Changed from v4 to v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run extraction
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: python main.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add market_prices.csv
          # The commit will fail if there are no changes, '|| exit 0' handles that
          git commit -m "Update market prices" || exit 0
          # This pulls your latest changes (like the 10-day revert) and puts the CSV on top
          git pull --rebase origin main
          git push
